<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Document Intelligence Refinery{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">Document Intelligence Refinery</a>
            <div class="nav-links">
                <a href="/">Upload</a>
                <a href="/ledger">Ledger</a>
            </div>
        </div>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>&copy; 2024 Document Intelligence Refinery</p>
    </footer>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
